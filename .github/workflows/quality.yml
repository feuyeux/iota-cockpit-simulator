name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target-ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --exclude cockpit-desktop
      - run: cargo clippy --workspace --exclude cockpit-desktop --all-targets -- -D warnings

  desktop-web:
    name: Desktop web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cockpit-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/cockpit-desktop/package-lock.json
      - run: npm ci
      - run: npm run test:tsc
      - run: npm test
      - run: npm run build
